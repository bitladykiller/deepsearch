# ============================================================
# Deep Research - Docker Compose
# ============================================================
# 服务：
#   - mysql      : 记忆系统存储（仅内部访问）
#   - redis      : 短期缓存 + LangGraph checkpointer（仅内部访问）
#   - milvus     : 向量数据库（仅内部访问）
#   - backend    : FastAPI API 服务（端口 8080）
#   - frontend   : Vue SPA + Nginx 反向代理（端口 3000）
# ============================================================

services:
  # ---- MySQL ----
  mysql:
    image: mysql:8.0
    pull_policy: if_not_present
    container_name: deepresearch-mysql
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-deepresearch123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-deepresearch}
      MYSQL_USER: ${MYSQL_USER:-deepresearch}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-deepresearch123}
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - deep_research_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-deepresearch123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    pull_policy: if_not_present
    container_name: deepresearch-redis
    volumes:
      - redis_data:/data
    networks:
      - deep_research_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Milvus (etcd 嵌入 + minio 单机) ----
  milvus:
    image: milvusdb/milvus:v2.5-latest
    pull_policy: if_not_present
    container_name: deepresearch-milvus
    volumes:
      - milvus_data:/var/lib/milvus
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    networks:
      - deep_research_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---- Backend (FastAPI) ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      pull: if_not_present
    container_name: deepresearch-backend
    volumes:
      - ./config.json:/app/config.json:ro
      - ./.env:/app/.env:ro
      - app_data:/app/data
    networks:
      - deep_research_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    environment:
      MYSQL_DSN: "mysql+pymysql://${MYSQL_USER:-deepresearch}:${MYSQL_PASSWORD:-deepresearch123}@mysql:3306/${MYSQL_DATABASE:-deepresearch}?charset=utf8mb4"
      REDIS_URL: "redis://redis:6379"
      CHECKPOINTER_BACKEND: redis
      SHORT_TERM_BACKEND: mysql
      LONG_TERM_BACKEND: mysql
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
    ports:
      - "8080:8000"
    restart: unless-stopped

  # ---- Frontend (Nginx + Vue SPA) ----
  frontend:
    build:
      context: ./front/agent_front
      dockerfile: Dockerfile
      pull: if_not_present
    container_name: deepresearch-frontend
    networks:
      - deep_research_net
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

# ---- 命名卷 ----
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  milvus_data:
    driver: local
  app_data:
    driver: local

# ---- 内部网络 ----
networks:
  deep_research_net:
    driver: bridge
